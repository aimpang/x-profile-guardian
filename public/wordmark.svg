<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <!-- X icon: two crossing laser lines -->
  <line x1="4" y1="8" x2="20" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="4" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- XSENTINEL wordmark -->
  <text x="32" y="28" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.18em" fill="white" text-anchor="start">XSENTINEL</text>
</svg>
